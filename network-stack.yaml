AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation stack for migration to Terraform: VPC, Subnet, and Security Group.'

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    Description: Environment name that will be prefixed to resource tags.
  VpcCidrBlock:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC.
  SubnetCidrBlock:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the Subnet.
  AllowedSSHLocation:
    Type: String
    Default: 0.0.0.0/0
    Description: The IP address range that can be used to SSH to the EC2 instances.

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-vpc

  MySubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref SubnetCidrBlock
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-subnet

  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH access
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSSHLocation
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-sg

Outputs:
  VpcId:
    Description: The ID of the VPC
    Value: !Ref MyVPC
    Export:
      Name: !Sub ${AWS::StackName}-VpcId

  SubnetId:
    Description: The ID of the Subnet
    Value: !Ref MySubnet
    Export:
      Name: !Sub ${AWS::StackName}-SubnetId

  SecurityGroupId:
    Description: The ID of the Security Group
    Value: !GetAtt MySecurityGroup.GroupId
    Export:
      Name: !Sub ${AWS::StackName}-SecurityGroupId